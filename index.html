<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEDELMÄKORI</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>HEDELMÄKORI</h1>
        <div class="game-board">
            <img src="kuva1.png" alt="Kuva 1" onclick="playSound('aani1', this)">
            <img src="kuva2.png" alt="Kuva 2" onclick="playSound('aani2', this)">
            <img src="kuva3.png" alt="Kuva 3" onclick="playSound('aani3', this)">
            <img src="kuva4.png" alt="Kuva 4" onclick="playSound('aani4', this)">
            <img src="kuva5.png" alt="Kuva 5" onclick="playSound('aani5', this)">
            <img src="kuva6.png" alt="Kuva 6" onclick="playSound('aani6', this)">
            <img src="kuva7.png" alt="Kuva 7" onclick="playSound('aani7', this)">
            <img src="kuva8.png" alt="Kuva 8" onclick="playSound('aani8', this)">
            <img src="kuva9.png" alt="Kuva 9" class="kuva9" onclick="playSound('aani9', this)" style="grid-column: 2 / 3; grid-row: 3;">
            <img src="kuva10.png" alt="Kuva 10" class="kuva10" onclick="playSound('aani10', this)" style="grid-column: 3 / 4; grid-row: 3;">
        </div>
        <img src="seis.png" alt="Seis" class="stop-button" onclick="stopAllSounds()">
    </div>
    <script src="script.js"></script>
</body>
</html>
