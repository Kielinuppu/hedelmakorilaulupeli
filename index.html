<!DOCTYPE html>
<html lang="fi">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>HEDELMÄKORI</title>
   <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap" rel="stylesheet">
   <link rel="stylesheet" href="styles.css">
</head>
<body>
   <div class="container">
       <h1>HEDELMÄKORI</h1>

           <source type="image/avif" srcset="seis.avif" />

           <img alt="Seis" class="stop-button" onclick="stopAllSounds()" loading="eager">
       </picture>
   </div>
   <script src="script.js"></script>

</html>
