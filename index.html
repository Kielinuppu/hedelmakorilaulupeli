<!DOCTYPE html>
<html lang="fi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEDELMÄKORI</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>HEDELMÄKORI</h1>
        <div class="game-board">
            <picture>
                <source srcset="kuva1.avif?v=1" type="image/avif">
                <source srcset="kuva1.png?v=1" type="image/png">
                <img src="kuva1.png" alt="Kuva 1" onclick="playSound('aani1', this)">
            </picture>
            <picture>
                <source srcset="kuva2.avif?v=1" type="image/avif">
                <source srcset="kuva2.png?v=1" type="image/png">
                <img src="kuva2.png" alt="Kuva 2" onclick="playSound('aani2', this)">
            </picture>
            <picture>
                <source srcset="kuva3.avif?v=1" type="image/avif">
                <source srcset="kuva3.png?v=1" type="image/png">
                <img src="kuva3.png" alt="Kuva 3" onclick="playSound('aani3', this)">
            </picture>
            <picture>
                <source srcset="kuva4.avif?v=1" type="image/avif">
                <source srcset="kuva4.png?v=1" type="image/png">
                <img src="kuva4.png" alt="Kuva 4" onclick="playSound('aani4', this)">
            </picture>
            <picture>
                <source srcset="kuva5.avif?v=1" type="image/avif">
                <source srcset="kuva5.png?v=1" type="image/png">
                <img src="kuva5.png" alt="Kuva 5" onclick="playSound('aani5', this)">
            </picture>
            <picture>
                <source srcset="kuva6.avif?v=1" type="image/avif">
                <source srcset="kuva6.png?v=1" type="image/png">
                <img src="kuva6.png" alt="Kuva 6" onclick="playSound('aani6', this)">
            </picture>
            <picture>
                <source srcset="kuva7.avif?v=1" type="image/avif">
                <source srcset="kuva7.png?v=1" type="image/png">
                <img src="kuva7.png" alt="Kuva 7" onclick="playSound('aani7', this)">
            </picture>
            <picture>
                <source srcset="kuva8.avif?v=1" type="image/avif">
                <source srcset="kuva8.png?v=1" type="image/png">
                <img src="kuva8.png" alt="Kuva 8" onclick="playSound('aani8', this)">
            </picture>
            <picture>
                <source srcset="kuva9.avif?v=1" type="image/avif">

                <img src="kuva9.png" alt="Kuva 9" class="kuva9" onclick="playSound('aani9', this)">
            </picture>
            <picture>
                <source srcset="kuva10.avif?v=1" type="image/avif">
                <source srcset="kuva10.png?v=1" type="image/png">
                <img src="kuva10.png" alt="Kuva 10" class="kuva10" onclick="playSound('aani10', this)">
            </picture>
        </div>
        <picture>
            <source srcset="seis.avif?v=1" type="image/avif">
            <source srcset="seis.png?v=1" type="image/png">
            <img src="seis.png" alt="Seis" class="stop-button" onclick="stopAllSounds()">
        </picture>
    </div>
    <script src="script.js"></script>
</body>
</html>
